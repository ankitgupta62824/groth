<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankit Gupta - Social Links</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            position: relative;
            box-sizing: border-box;
        }

        /* Profile Section */
        .profile { margin-bottom: 30px; }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            background-color: #eee;
        }
        .profile h1 { margin: 10px 0 5px; color: #333; font-size: 24px; }
        .profile p { color: #666; margin: 0; }

        /* Social Grid */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .social-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            padding: 15px;
            border-radius: 15px;
            transition: all 0.3s ease;
            background: #fff;
            border: 1px solid #eee;
        }
        .social-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background: #f9f9f9;
        }
        .social-icon { width: 50px; height: 50px; margin-bottom: 10px; }
        .social-card span { color: #333; font-weight: 600; font-size: 14px; }

        /* Buttons */
        .login-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #333;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .login-btn:hover { opacity: 1; }

        /* Modals */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0;
            width: 100%; height: 100%; 
            overflow: auto; 
            background-color: rgba(0,0,0,0.5); 
            animation: fadeIn 0.3s;
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto; 
            padding: 25px;
            border-radius: 15px;
            width: 90%; 
            max-width: 500px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            max-height: 85vh;
            overflow-y: auto;
            box-sizing: border-box;
        }
        .modal-content h2 { margin-top: 0; color: #333; }
        
        /* Form Inputs */
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #555; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        /* Admin List Items */
        .link-item {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        .link-item input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; min-width: 150px; }
        .btn-remove { background: #ff4d4d; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .btn-add { background: #4CAF50; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .btn-save-all { background: #2196F3; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 16px; }
        .btn-cancel { background: #f1f1f1; color: #333; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 10px; }

        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #ddd; }
        .tab { padding: 10px; cursor: pointer; flex: 1; text-align: center; color: #888; border-bottom: 2px solid transparent; }
        .tab.active { color: #2196F3; border-bottom-color: #2196F3; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from {opacity: 0} to {opacity: 1} }
        
        /* Upload Button Style */
        .upload-btn {
            display: inline-block;
            padding: 8px 15px;
            background: #eee;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }
        #imagePreview { max-width: 100%; max-height: 80px; border-radius: 8px; margin-top: 10px; display: none; }
    </style>
</head>

        <button class="login-btn" onclick="openLoginModal()">Admin</button>

        <div class="profile">
            <img id="profileImg" src="https://i.ibb.co/6R8XMJ2/Untitled-design-1.png" alt="Profile Picture" class="profile-pic">
            <h1 id="profileName">Ankit Gupta</h1>

        </div>
        
        <div class="social-grid" id="socialContainer"></div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>Admin Login</h2>
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Password...">
            </div>
            <div id="errorMsg" style="color:red; font-size:12px; margin-bottom:10px; display:none;">Galat Password!</div>
            <button class="btn-save-all" onclick="validateLogin()">Login</button>
            <button class="btn-cancel" onclick="closeModal('loginModal')">Cancel</button>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center;">Admin Panel</h2>
            
            <!-- Tabs -->
            <div class="tabs">
                <div class="tab active" onclick="switchTab('profileTab', this)">Profile</div>
                <div class="tab" onclick="switchTab('linksTab', this)">Social Links</div>
                <div class="tab" onclick="switchTab('settingsTab', this)">Settings</div>
            </div>

            <!-- Profile Tab -->
            <div id="profileTab" class="tab-content active">
                <div class="input-group">
                    <label>Name:</label>
                    <input type="text" id="adminName">
                </div>
                <div class="input-group">
                    <label>Username:</label>
                    <input type="text" id="adminUsername">
                </div>
                <div class="input-group">
                    <label>Profile Photo:</label>
                    <input type="file" id="photoUpload" accept="image/*" style="display:none" onchange="previewImage(this)">
                    <label for="photoUpload" class="upload-btn">Upload Image</label>
                    <img id="imagePreview" src="#" alt="Preview">
                </div>
                <button class="btn-save-all" onclick="saveProfile()">Save Profile</button>
            </div>

            <!-- Links Tab -->
            <div id="linksTab" class="tab-content">
                <p style="font-size:13px; color:#666;">Link paste karein, icon automatic set hoga.</p>
                <div id="linksList"></div>
                
                <button class="btn-add" onclick="addNewLinkInput()">+ Add New Link</button>
                <button class="btn-save-all" onclick="saveLinks()">Save All Links</button>
            </div>

            <!-- Settings Tab -->
            <div id="settingsTab" class="tab-content">
                <div class="input-group">
                    <label>Change Password:</label>
                    <input type="password" id="newPasswordInput" placeholder="Naya Password">
                </div>
                <button class="btn-save-all" onclick="changePassword()">Update Password</button>
            </div>

            <button class="btn-cancel" onclick="closeModal('adminModal')" style="margin-top:20px;">Close Panel</button>
        </div>
    </div>

        // 1. Render Profile
        function renderProfile() {
            document.getElementById('profileName').innerText = appData.profile.name;
            document.getElementById('profileUsername').innerText = "@" + appData.profile.username;
            document.getElementById('profileImg').src = appData.profile.photo;
        }

        // 2. Render Social Links
        function renderLinks() {
            const container = document.getElementById('socialContainer');
            container.innerHTML = '';
            
            appData.links.forEach(link => {
                const platformInfo = detectPlatform(link.url);
                const card = document.createElement('a');
                card.href = link.url;
                card.target = "_blank";
                card.classList.add('social-card');
                
                // SVG with dynamic color
                card.innerHTML = `<svg class="social-icon" viewBox="0 0 24 24" fill="${platformInfo.color}" xmlns="http://www.w3.org/2000/svg">${platformInfo.svg}</svg>
                                  <span>${platformInfo.name}</span>`;
                container.appendChild(card);
            });
        }

        // 3. Detect Platform from URL
        function detectPlatform(url) {
            url = url.toLowerCase();
            if (url.includes("instagram")) return { name: "Instagram", ...iconLibrary.instagram };
            if (url.includes("youtube") || url.includes("youtu.be")) return { name: "YouTube", ...iconLibrary.youtube };
            if (url.includes("facebook") || url.includes("fb.com")) return { name: "Facebook", ...iconLibrary.facebook };
            if (url.includes("telegram") || url.includes("t.me")) return { name: "Telegram", ...iconLibrary.telegram };
            if (url.includes("twitter") || url.includes("x.com")) return { name: "X (Twitter)", ...iconLibrary.x };
            if (url.includes("linkedin")) return { name: "LinkedIn", ...iconLibrary.linkedin };
            if (url.includes("snapchat")) return { name: "Snapchat", ...iconLibrary.snapchat };
            if (url.includes("pinterest")) return { name: "Pinterest", ...iconLibrary.pinterest };
            if (url.includes("threads")) return { name: "Threads", ...iconLibrary.threads };
            if (url.includes("sharechat")) return { name: "ShareChat", ...iconLibrary.sharechat };
            return { name: "Link", ...iconLibrary.default };
        }

        // 4. Save Data to LocalStorage
        function saveToStorage() {
            localStorage.setItem('ankitPortfolioData', JSON.stringify(appData));
        }

        // --- Admin Panel Logic ---

        function openLoginModal() {
            document.getElementById('loginModal').style.display = 'block';
            document.getElementById('passwordInput').value = '';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function validateLogin() {
            const inputPass = document.getElementById('passwordInput').value;
            if (inputPass === appData.password) {
                closeModal('loginModal');
                openAdminPanel();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function openAdminPanel() {
            // Load current data into admin form
            document.getElementById('adminName').value = appData.profile.name;
            document.getElementById('adminUsername').value = appData.profile.username;
            document.getElementById('imagePreview').src = appData.profile.photo;
            document.getElementById('imagePreview').style.display = 'block';
            tempNewPhoto = appData.profile.photo;

            renderAdminLinksList(); // Render edit list
            document.getElementById('adminModal').style.display = 'block';
        }

        // Admin Link List Renderer
        function renderAdminLinksList() {
            const listContainer = document.getElementById('linksList');
            listContainer.innerHTML = '';
            
            appData.links.forEach((link, index) => {
                const item = document.createElement('div');
                item.className = 'link-item';
                item.innerHTML = `
                    <input type="text" value="${link.url}" onchange="updateLinkUrl(${index}, this.value)" placeholder="Paste URL here">
                    <button class="btn-remove" onclick="removeLink(${index})">Delete</button>
                `;
                listContainer.appendChild(item);
            });
        }

        // Add New Link Input
        function addNewLinkInput() {
            appData.links.push({ id: Date.now(), url: "https://example.com" });
            renderAdminLinksList();
            saveToStorage(); // Optional: save immediately or wait for bulk save
        }

        function updateLinkUrl(index, newUrl) {
            appData.links[index].url = newUrl;
        }

        function removeLink(index) {
            appData.links.splice(index, 1);
            renderAdminLinksList();
            saveToStorage();
            renderLinks(); // Update main view immediately
        }

        // Save Links Button
        function saveLinks() {
            saveToStorage();
            renderLinks();
            alert("Social Links Saved!");
        }

        // Save Profile Button
        function saveProfile() {
            appData.profile.name = document.getElementById('adminName').value;
            appData.profile.username = document.getElementById('adminUsername').value;
            appData.profile.photo = tempNewPhoto;
            
            saveToStorage();
            renderProfile();
            alert("Profile Saved!");
        }

        // Image Upload Preview
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                    tempNewPhoto = e.target.result; // Store Base64 string
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Change Password
        function changePassword() {
            const newPass = document.getElementById('newPasswordInput').value;
            if (newPass.length > 4) {
                appData.password = newPass;
                saveToStorage();
                alert("Password Changed Successfully!");
                document.getElementById('newPasswordInput').value = "";
            } else {
                alert("Password kam se kam 5 characters ka hona chahiye.");
            }
        }

        // Tab Switching
        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // Initialize App
        renderProfile();
        renderLinks();

        // Enter key login
        document.getElementById("passwordInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") validateLogin();
        });
    </script>
</body>
</html>
